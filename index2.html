<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Layout Practice</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="CSS/style.css">

</head>

<body>

<div class="box">
One Box is created
</div>


<div class="container d-flex justify-content-between border border-primary bg-secondary text-white p-3">
<div>Logo</div>
<div>Menu</div>
<div>Profile</div>
</div>


<div class="container1">
<div><button class="btn btn-primary">Primary</button></div>
<div><button class="btn btn-success">Success</button></div>
<div><button class="btn btn-info">Info</button></div>
</div>


<div id="carouselExampleIndicators"
class="carousel slide"
data-bs-ride="carousel"
data-bs-interval="2000">

<div class="carousel-inner">

<div class="carousel-item active">
<img src="https://images.pexels.com/photos/33314093/pexels-photo-33314093.jpeg"
class="d-block w-100">
</div>

<div class="carousel-item">
<img src="https://images.pexels.com/photos/414612/pexels-photo-414612.jpeg"
class="d-block w-100">
</div>

<div class="carousel-item">
<img src="https://images.pexels.com/photos/34950/pexels-photo.jpg"
class="d-block w-100">
</div>

</div>


<button class="carousel-control-prev"
type="button"
data-bs-target="#carouselExampleIndicators"
data-bs-slide="prev">

<span class="carousel-control-prev-icon"></span>

</button>


<button class="carousel-control-next"
type="button"
data-bs-target="#carouselExampleIndicators"
data-bs-slide="next">

<span class="carousel-control-next-icon"></span>

</button>

</div>


<div class="container1">
<div class="card">Card 1</div>
<div class="card">Card 2</div>
</div>


<div class="grid">
<div class="box1">1 box</div>
<div class="box1">2 box</div>
<div class="box1">3 box</div>
</div>


<div class="box2">
Resize screen to see color change
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
