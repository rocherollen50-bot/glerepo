<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   
<script>
    // Now see the code which we did in the previous examples in fetch_example and promise_example
    async function fetchUsers(){
        try{
            await new Promise(resolve => setTimeout(resolve, 5000)); // simulating delay

            const response = await fetch('https://jsonplaceholder.typicode.com/users');

            if(!response.ok){
                throw new Error("Failed to fetch users");
            }

            const data = await response.json();
            console.log("Data received from API : ", data);

            return data; // returns a promise
        }
        catch(err){
            console.error("Error while fetching users : ", err);
        }
    }

    // other non-blocking tasks 
    console.log("Doing some other tasks while fetching users...");

    for(var i = 0; i <= 3; i++){
        console.log("Performing some other task while fetching users", i);
    }

    fetchUsers()
    .then(data => {
        // process the users data here
        console.log("Users data processed : ", data);

        data.forEach(user => {
            document.write(`<p>User Name : ${user.username} - EMail : ${user.email}</p>`);
        });
    })
    .catch(err => {
        document.write(`Error while processing users data : <h3>${err}</h3>`);
    });

</script>

</body>
</html>
